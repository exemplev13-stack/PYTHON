<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PySec Academy</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --ink:     #0b0c11;
  --ink2:    #10121a;
  --ink3:    #161924;
  --ink4:    #1e2130;
  --ink5:    #252a3c;
  --line:    #222639;
  --line2:   #2f3550;
  --lime:    #c8ff57;
  --lime2:   #aee040;
  --limdim:  rgba(200,255,87,.07);
  --limdim2: rgba(200,255,87,.13);
  --sky:     #5db8ff;
  --skydim:  rgba(93,184,255,.09);
  --fire:    #ff8c42;
  --firedim: rgba(255,140,66,.09);
  --rose:    #ff5e7a;
  --rosedim: rgba(255,94,122,.09);
  --violet:  #c084fc;
  --vdim:    rgba(192,132,252,.09);
  --fg:      #d8deee;
  --fg2:     #6b7492;
  --fg3:     #353d5c;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Barlow', sans-serif;
  --rr:      4px;
  --rr2:     8px;
  --sb-w:    248px;
  --tb-h:    50px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{
  background:var(--ink);
  color:var(--fg);
  font-family:var(--sans);
  min-height:100vh;
  overflow-x:hidden;
}
::selection{background:var(--limdim2);color:var(--lime)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--line2)}
::-webkit-scrollbar-track{background:transparent}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.shell{
  display:grid;
  grid-template-columns:var(--sb-w) 1fr;
  grid-template-rows:var(--tb-h) 1fr;
  height:100vh;
}

/* ─── TOPBAR ─────────────────────────────────────────────── */
.topbar{
  grid-column:1/-1;
  background:var(--ink2);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:12px;
  position:sticky;
  top:0;
  z-index:200;
}

.logo{
  font-family:var(--mono);
  font-weight:600;
  font-size:13px;
  color:var(--lime);
  display:flex;
  align-items:center;
  gap:0;
  flex-shrink:0;
  letter-spacing:-.2px;
}
.logo-mute{color:var(--fg3)}

.hamburger{
  display:none;
  background:none;
  border:1px solid var(--line2);
  border-radius:var(--rr);
  cursor:pointer;
  padding:5px 7px;
  align-items:center;
  justify-content:center;
  gap:3px;
  flex-direction:column;
  flex-shrink:0;
  transition:border-color .15s;
}
.hamburger:hover{border-color:var(--fg2)}
.hamburger span{
  display:block;
  width:14px;
  height:1.5px;
  background:var(--fg2);
  border-radius:1px;
  transition:transform .2s, opacity .2s;
}
.hamburger.open span:nth-child(1){transform:translateY(5px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-5px) rotate(-45deg)}

.tb-mid{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  overflow:hidden;
}
.prog-lbl{
  font-family:var(--mono);
  font-size:10px;
  color:var(--fg3);
  white-space:nowrap;
  flex-shrink:0;
}
.prog-rail{
  flex:1;
  max-width:180px;
  height:2px;
  background:var(--ink5);
  border-radius:1px;
  overflow:hidden;
  flex-shrink:0;
}
.prog-bar{
  height:100%;
  background:var(--lime);
  border-radius:1px;
  transition:width .4s ease;
}

.xp-tag{
  margin-left:auto;
  font-family:var(--mono);
  font-size:10px;
  color:var(--fire);
  background:var(--firedim);
  border:1px solid rgba(255,140,66,.18);
  padding:3px 9px;
  border-radius:20px;
  flex-shrink:0;
}

/* ─── SIDEBAR ────────────────────────────────────────────── */
.sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:148;
  backdrop-filter:blur(2px);
}
.sidebar-overlay.on{display:block}

.sidebar{
  background:var(--ink2);
  border-right:1px solid var(--line);
  overflow-y:auto;
  padding:8px 0 32px;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}

.sb-mod{
  padding:0 8px;
  margin-bottom:2px;
}
.sb-lbl{
  font-family:var(--mono);
  font-size:9px;
  color:var(--fg3);
  letter-spacing:1.4px;
  text-transform:uppercase;
  padding:12px 8px 3px;
  display:block;
}
.mod-btn{
  width:100%;
  background:none;
  border:none;
  text-align:left;
  padding:7px 9px;
  border-radius:var(--rr);
  cursor:pointer;
  color:var(--fg2);
  font-family:var(--sans);
  font-size:12.5px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  transition:background .12s,color .12s;
}
.mod-btn:hover{background:var(--ink4);color:var(--fg)}
.mod-btn.on{background:var(--limdim2);color:var(--lime)}
.mod-pip{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--line2);
  flex-shrink:0;
  transition:background .12s;
}
.mod-btn.on .mod-pip{background:var(--lime)}

.les-btn{
  width:100%;
  background:none;
  border:none;
  text-align:left;
  padding:5px 9px 5px 25px;
  border-radius:var(--rr);
  cursor:pointer;
  color:var(--fg3);
  font-family:var(--mono);
  font-size:10px;
  display:flex;
  align-items:center;
  gap:6px;
  transition:background .12s,color .12s;
}
.les-btn:hover{color:var(--fg2);background:var(--ink3)}
.les-btn.on{color:var(--lime)}
.les-btn.ok{color:var(--fg3)}
.chk{color:var(--lime);font-size:9px}

/* ─── MAIN ───────────────────────────────────────────────── */
.main{
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.content{
  flex:1;
  overflow-y:auto;
  padding:26px 34px;
  max-width:840px;
  width:100%;
}

/* ─── LESSON HEADER ──────────────────────────────────────── */
.lh{margin-bottom:22px}
.l-tag{
  font-family:var(--mono);
  font-size:9.5px;
  padding:2px 9px;
  border-radius:20px;
  display:inline-flex;
  align-items:center;
  gap:5px;
  margin-bottom:9px;
  letter-spacing:.3px;
}
.t-beg{background:var(--limdim);color:var(--lime);border:1px solid rgba(200,255,87,.18)}
.t-int{background:var(--skydim);color:var(--sky);border:1px solid rgba(93,184,255,.18)}
.t-adv{background:var(--firedim);color:var(--fire);border:1px solid rgba(255,140,66,.18)}
.t-exp{background:var(--vdim);color:var(--violet);border:1px solid rgba(192,132,252,.18)}
.l-title{
  font-size:21px;
  font-weight:800;
  color:var(--fg);
  line-height:1.2;
  margin-bottom:5px;
  letter-spacing:-.3px;
}
.l-meta{
  font-family:var(--mono);
  font-size:10.5px;
  color:var(--fg3);
}

/* ─── THEORY ─────────────────────────────────────────────── */
.theory{
  background:var(--ink2);
  border:1px solid var(--line);
  border-radius:var(--rr2);
  padding:16px 20px;
  margin-bottom:14px;
}
.theory h3{
  font-size:12px;
  font-weight:700;
  color:var(--fg);
  margin-bottom:9px;
  display:flex;
  align-items:center;
  gap:7px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.theory h3::before{
  content:'';
  display:block;
  width:2px;
  height:13px;
  background:var(--sky);
  border-radius:1px;
}
.theory p{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--fg2);
  line-height:1.8;
}

/* ─── CODE BLOCK ─────────────────────────────────────────── */
.cblock{
  background:var(--ink);
  border:1px solid var(--line);
  border-radius:var(--rr);
  overflow:hidden;
  margin:10px 0;
}
.cblock-top{
  background:var(--ink3);
  padding:6px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--line);
}
.c-lang{font-family:var(--mono);font-size:9px;color:var(--fg3)}
.c-copy{
  background:none;
  border:none;
  color:var(--fg3);
  font-family:var(--mono);
  font-size:9px;
  cursor:pointer;
  padding:2px 6px;
  border-radius:3px;
  transition:color .12s,background .12s;
}
.c-copy:hover{color:var(--lime);background:var(--limdim)}
.c-body{
  padding:13px 15px;
  font-family:var(--mono);
  font-size:11.5px;
  line-height:1.75;
  overflow-x:auto;
  white-space:pre;
}
/* syntax colors */
.kw {color:#f472b6}
.fn {color:#86efac}
.str{color:#fde68a}
.cm {color:#4b5380;font-style:italic}
.num{color:#c4b5fd}
.op {color:#94a3b8}

/* ─── TABS ───────────────────────────────────────────────── */
.tabs{
  display:flex;
  gap:2px;
  margin-bottom:18px;
  background:var(--ink2);
  border:1px solid var(--line);
  border-radius:var(--rr);
  padding:3px;
}
.tab-btn{
  flex:1;
  padding:6px 10px;
  border:none;
  background:none;
  color:var(--fg2);
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border-radius:3px;
  transition:all .12s;
}
.tab-btn.on{background:var(--ink5);color:var(--fg)}
.tab-btn:hover:not(.on){color:var(--fg)}
.tc{display:none}
.tc.on{display:block}

/* ─── EXERCISE ───────────────────────────────────────────── */
.excard{
  border:1px solid var(--line);
  border-radius:var(--rr2);
  overflow:hidden;
  margin-bottom:16px;
}
.exhead{
  background:var(--ink3);
  padding:11px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--line);
}
.extitle{
  font-size:13px;
  font-weight:700;
  color:var(--fg);
  display:flex;
  align-items:center;
  gap:7px;
}
.xp-pill{
  font-family:var(--mono);
  font-size:9px;
  padding:2px 7px;
  border-radius:3px;
  background:var(--firedim);
  color:var(--fire);
  flex-shrink:0;
}
.exbody{padding:16px}
.exbody p{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--fg2);
  line-height:1.8;
  margin-bottom:12px;
}
.expected-box{
  background:var(--ink);
  border:1px solid var(--line);
  border-radius:var(--rr);
  padding:9px 13px;
  margin-bottom:12px;
}
.exp-lbl{
  font-family:var(--mono);
  font-size:8.5px;
  color:var(--fg3);
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:5px;
}
.expected-box pre{
  font-family:var(--mono);
  font-size:11px;
  color:var(--lime);
  line-height:1.65;
}

/* ─── EDITOR ─────────────────────────────────────────────── */
.edwrap{
  background:var(--ink);
  border:1px solid var(--line);
  border-radius:var(--rr);
  overflow:hidden;
  margin-bottom:9px;
}
.edbar{
  background:var(--ink3);
  padding:6px 11px;
  display:flex;
  align-items:center;
  gap:5px;
  border-bottom:1px solid var(--line);
}
.dot-r{width:8px;height:8px;border-radius:50%;background:#ff5f56;flex-shrink:0}
.dot-y{width:8px;height:8px;border-radius:50%;background:#ffbd2e;flex-shrink:0}
.dot-g{width:8px;height:8px;border-radius:50%;background:#27c93f;flex-shrink:0}
.ed-fname{
  font-family:var(--mono);
  font-size:9.5px;
  color:var(--fg3);
  margin-left:4px;
}
textarea.editor{
  width:100%;
  background:var(--ink);
  color:var(--fg);
  font-family:var(--mono);
  font-size:12px;
  line-height:1.7;
  padding:13px;
  border:none;
  outline:none;
  resize:vertical;
  min-height:120px;
  tab-size:4;
}

.btns{
  display:flex;
  gap:7px;
  align-items:center;
  flex-wrap:wrap;
}
.btn{
  font-family:var(--mono);
  font-size:11px;
  padding:6px 13px;
  border-radius:var(--rr);
  border:none;
  cursor:pointer;
  transition:all .12s;
  font-weight:500;
  white-space:nowrap;
}
.b-run {background:var(--lime);color:#070a03;font-weight:700}
.b-run:hover{background:var(--lime2)}
.b-hint{background:var(--firedim);color:var(--fire);border:1px solid rgba(255,140,66,.2)}
.b-hint:hover{background:rgba(255,140,66,.16)}
.b-sol {background:var(--ink4);color:var(--fg2);border:1px solid var(--line2)}
.b-sol:hover{color:var(--fg);background:var(--ink5)}
.b-next{background:var(--skydim);color:var(--sky);border:1px solid rgba(93,184,255,.2);padding:6px 16px}
.b-next:hover{background:rgba(93,184,255,.15)}

/* ─── OUTPUT ─────────────────────────────────────────────── */
.outpanel{
  background:var(--ink);
  border:1px solid var(--line);
  border-radius:var(--rr);
  overflow:hidden;
  margin-top:9px;
  display:none;
}
.outpanel.on{display:block}
.outhdr{
  background:var(--ink3);
  padding:4px 12px;
  font-family:var(--mono);
  font-size:8.5px;
  color:var(--fg3);
  border-bottom:1px solid var(--line);
  text-transform:uppercase;
  letter-spacing:.6px;
}
.outbody{
  padding:11px 13px;
  font-family:var(--mono);
  font-size:11.5px;
  line-height:1.7;
  white-space:pre-wrap;
}
.outbody.ok {color:var(--lime)}
.outbody.err{color:var(--rose)}
.outbody.inf{color:var(--fg2)}

/* ─── HINT / SOLUTION ────────────────────────────────────── */
.hint{
  background:var(--firedim);
  border:1px solid rgba(255,140,66,.15);
  border-radius:var(--rr);
  padding:9px 13px;
  margin-top:9px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--fire);
  line-height:1.65;
  display:none;
}
.hint.on{display:block}
.solpanel{display:none;margin-top:9px}
.solpanel.on{display:block}
.sol-lbl{
  font-family:var(--mono);
  font-size:8.5px;
  color:var(--fg3);
  text-transform:uppercase;
  letter-spacing:.7px;
  margin-bottom:5px;
}

/* ─── PROJECT ────────────────────────────────────────────── */
.projcard{
  background:var(--ink2);
  border:1px solid var(--line);
  border-radius:var(--rr2);
  padding:20px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.projcard::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1.5px;
  background:linear-gradient(90deg,var(--lime),var(--sky));
}
.proj-desc{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--fg2);
  line-height:1.7;
  margin-bottom:12px;
}
.proj-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.ptag{
  font-family:var(--mono);
  font-size:9.5px;
  padding:2px 7px;
  border-radius:3px;
  background:var(--ink4);
  color:var(--fg3);
  border:1px solid var(--line);
}

/* ─── MODAL ──────────────────────────────────────────────── */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(4,5,10,.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:300;
  backdrop-filter:blur(4px);
}
.overlay.on{display:flex}
.modal{
  background:var(--ink2);
  border:1px solid var(--line2);
  border-radius:var(--rr2);
  padding:26px 22px;
  max-width:400px;
  width:90%;
  text-align:center;
}
.modal h3{font-size:17px;font-weight:800;color:var(--lime);margin-bottom:6px;letter-spacing:-.2px}
.modal p{font-family:var(--mono);font-size:11.5px;color:var(--fg2);line-height:1.65;margin-bottom:16px}
.modal-xp{font-size:28px;font-weight:800;color:var(--fire);margin:8px 0;font-family:var(--mono)}

/* ─── WELCOME ────────────────────────────────────────────── */
.welcome{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:58vh;
  text-align:center;
  padding:28px 16px;
}
.w-ascii{
  font-family:var(--mono);
  font-size:10px;
  color:var(--lime);
  line-height:1.3;
  margin-bottom:18px;
  opacity:.35;
}
.welcome h1{
  font-size:clamp(20px,4.5vw,32px);
  font-weight:800;
  letter-spacing:-.5px;
  margin-bottom:10px;
  background:linear-gradient(120deg,var(--lime),var(--sky));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.welcome p{
  font-family:var(--mono);
  font-size:12px;
  color:var(--fg2);
  max-width:440px;
  line-height:1.8;
  margin-bottom:22px;
}
.w-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  max-width:380px;
  width:100%;
  margin-bottom:22px;
}
.w-stat{
  background:var(--ink2);
  border:1px solid var(--line);
  border-radius:var(--rr);
  padding:12px 8px;
}
.w-stat .n{font-size:18px;font-weight:800;color:var(--lime);font-family:var(--mono)}
.w-stat .l{font-family:var(--mono);font-size:9.5px;color:var(--fg3);margin-top:2px}
.w-start{
  background:var(--lime);
  color:#050a02;
  font-family:var(--sans);
  font-weight:800;
  font-size:13px;
  padding:10px 28px;
  border-radius:var(--rr);
  border:none;
  cursor:pointer;
  letter-spacing:-.1px;
  transition:background .15s,transform .15s;
}
.w-start:hover{background:var(--lime2);transform:translateY(-2px)}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease forwards}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:860px){
  :root{--sb-w:220px}
  .content{padding:20px 22px}
}

@media(max-width:620px){
  /* sidebar becomes a slide-in drawer */
  .shell{
    grid-template-columns:1fr;
    grid-template-rows:var(--tb-h) 1fr;
  }
  .sidebar{
    position:fixed;
    top:var(--tb-h);
    left:0;
    bottom:0;
    width:var(--sb-w);
    z-index:150;
    transform:translateX(-100%);
    box-shadow:3px 0 20px rgba(0,0,0,.6);
    border-right:1px solid var(--line2);
  }
  .sidebar.open{transform:translateX(0)}

  .hamburger{display:flex}

  /* hide progress bar in topbar on mobile */
  .tb-mid{display:none}

  .content{
    padding:14px 12px;
    max-width:100%;
  }

  .l-title{font-size:18px}
  .editor{font-size:11px;min-height:100px}
  .btns{gap:5px}
  .btn{font-size:10px;padding:5px 9px}
  .c-body{font-size:10.5px}

  .w-ascii{display:none}
  .welcome{min-height:45vh;padding:20px 10px}
  .welcome p{font-size:11px}
  .w-grid{max-width:100%}

  .modal{padding:20px 16px}

  .exhead{padding:10px 13px}
  .exbody{padding:13px}
}

@media(max-width:360px){
  .btn{padding:4px 7px;font-size:9.5px}
  .xp-tag{font-size:9px;padding:2px 6px}
}
</style>
</head>
<body>
<div class="shell">

<!-- TOP BAR -->
<header class="topbar">
  <button class="hamburger" id="hbg" aria-label="Menu" onclick="toggleSB()">
    <span></span><span></span><span></span>
  </button>
  <div class="logo">
    <span class="logo-mute">[</span>py<span style="color:var(--fg2)">sec</span>_<span class="logo-mute">]</span>

function toggleSB(){
  const sb  = document.getElementById('sb');
  const ov  = document.getElementById('sbOver');
  const hbg = document.getElementById('hbg');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('on', open);
  hbg.classList.toggle('open', open);
}
function closeSB(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('sbOver').classList.remove('on');
  document.getElementById('hbg').classList.remove('open');
}

/* ─── STATE ───────────────────────────────── */
let state = {
  currentLesson: null,
  completed: new Set(JSON.parse(localStorage.getItem('pyc_done')||'[]')),
  xp: parseInt(localStorage.getItem('pyc_xp')||'0'),
};
function save(){
  localStorage.setItem('pyc_done', JSON.stringify([...state.completed]));
  localStorage.setItem('pyc_xp', state.xp);
}
function addXP(n){
  state.xp += n;
  document.getElementById('xpVal').textContent = state.xp;
  save();
}
function updateProgress(){
  const total = CURRICULUM.reduce((a,m)=>a+m.lessons.reduce((b,l)=>b+l.exercises.length,0),0);
  const done  = state.completed.size;
  document.getElementById('progLbl').textContent = `${done}/${total} ex`;
  document.getElementById('progBar').style.width = total ? (done/total*100)+'%' : '0%';
}

/* ─── SIDEBAR BUILD ───────────────────────── */
function buildSidebar(){
  let h = '';
  CURRICULUM.forEach((mod,mi)=>{
    h += `<div class="sb-mod">
      <span class="sb-lbl">Module ${mi+1}</span>
      <button class="mod-btn" onclick="openModule('${mod.id}')">
        <span class="mod-pip"></span>${mod.title}
      </button>`;
    mod.lessons.forEach(l=>{
      const ok = l.exercises.every(e=>state.completed.has(e.id));
      h += `<button class="les-btn ${ok?'ok':''}" id="btn_${l.id}" onclick="openLesson('${mod.id}','${l.id}');closeSB()">
        ${ok?'<span class="chk">✓</span>':'○'} ${l.title}
      </button>`;
    });
    h += `<button class="les-btn" onclick="openProject('${mod.id}');closeSB()">◈ Projet</button>
    </div>`;
  });
  document.getElementById('sb').innerHTML = h;
}

/* ─── NAVIGATION ──────────────────────────── */
function openModule(id){
  const m = CURRICULUM.find(m=>m.id===id);
  if(m && m.lessons.length) openLesson(id, m.lessons[0].id);
}
function openLesson(modId, lesId){
  const mod = CURRICULUM.find(m=>m.id===modId);
  const les = mod.lessons.find(l=>l.id===lesId);
  state.currentLesson = les;
  document.querySelectorAll('.les-btn').forEach(b=>b.classList.remove('on'));
  const b = document.getElementById('btn_'+lesId);
  if(b) b.classList.add('on');
  renderLesson(mod, les);
}

/* ─── RENDER LESSON ───────────────────────── */

  const ca = document.getElementById('content');
  ca.innerHTML = `<div class="fu">
    <div class="lh">
      <span class="l-tag ${tagCls(mod.tagClass)}">${mod.level}</span>
      <div class="l-title">${les.title}</div>
      <div class="l-meta">${mod.title} · Module ${CURRICULUM.indexOf(mod)+1}</div>
    </div>
    <div class="tabs">
      <button class="tab-btn on" id="tb_theory_${les.id}" onclick="switchTab('theory','${les.id}')">Théorie</button>
      <button class="tab-btn" id="tb_exercises_${les.id}" onclick="switchTab('exercises','${les.id}')">Exercices (${les.exercises.length})</button>
    </div>
    <div class="tc on" id="tab_theory_${les.id}">
      <div class="theory"><h3>Concept</h3><p>${les.theory}</p></div>
      <div class="cblock">
        <div class="cblock-top"><span class="c-lang">python</span><button class="c-copy" onclick="copyCode(this)">copier</button></div>
        <div class="c-body">${hl(les.code)}</div>

    <div class="tc" id="tab_exercises_${les.id}">
      ${les.exercises.map((ex,i)=>renderEx(ex,i)).join('')}
    </div>
  </div>`;
  ca.scrollTop = 0;
}

function tagCls(old){
  const map={
    'tag-beginner':'t-beg',
    'tag-intermediate':'t-int',
    'tag-advanced':'t-adv',
    'tag-expert':'t-exp'
  };
  return map[old]||'t-beg';
}

function renderEx(ex, idx){
  const ok = state.completed.has(ex.id);
  return `<div class="excard" id="ec_${ex.id}">
    <div class="exhead">
      <div class="extitle">
        ${ok?'<span style="color:var(--lime)">✓</span>':''}
        <span>Ex.${idx+1} — ${ex.title}</span>
      </div>
      <span class="xp-pill">+${ex.xp} xp</span>
    </div>
    <div class="exbody">
      <p>${ex.desc.replace(/\n/g,'<br>')}</p>
      <div class="expected-box">
        <div class="exp-lbl">Résultat attendu</div>
        <pre>${ex.expected}</pre>
      </div>
      <div class="edwrap">
        <div class="edbar">
          <span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span>
          <span class="ed-fname">ex${idx+1}.py</span>
        </div>
        <textarea class="editor" id="ed_${ex.id}" spellcheck="false">${ex.starter}</textarea>
      </div>
      <div class="btns">
        <button class="btn b-run"  onclick="runCheck('${ex.id}')">▶ Vérifier</button>
        <button class="btn b-hint" onclick="toggleHint('${ex.id}')">Indice</button>
        <button class="btn b-sol"  onclick="toggleSol('${ex.id}')">Corrigé</button>
      </div>
      <div class="hint" id="hint_${ex.id}">${ex.hint}</div>
      <div class="outpanel" id="out_${ex.id}">
        <div class="outhdr">output</div>
        <div class="outbody" id="ob_${ex.id}"></div>
      </div>
      <div class="solpanel" id="sol_${ex.id}">
        <div class="sol-lbl">Corrigé</div>
        <div class="cblock">
          <div class="cblock-top"><span class="c-lang">python</span></div>
          <div class="c-body">${hl(ex.solution)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ─── TAB SWITCH ──────────────────────────── */
function switchTab(tab, lesId){
  ['theory','exercises'].forEach(t=>{
    document.getElementById('tab_'+t+'_'+lesId)?.classList.toggle('on', t===tab);
    document.getElementById('tb_'+t+'_'+lesId)?.classList.toggle('on', t===tab);
  });
}

/* ─── RUN CHECK ───────────────────────────── */
function runCheck(exId){
  const les = state.currentLesson;
  const ex  = les.exercises.find(e=>e.id===exId);
  const code= document.getElementById('ed_'+exId).value;
  const out = document.getElementById('out_'+exId);
  const ob  = document.getElementById('ob_'+exId);
  out.classList.add('on');
  if(ex.check(code)){
    ob.className='outbody ok';
    ob.textContent='✓ Structure correcte !';
    if(!state.completed.has(exId)){
      state.completed.add(exId);
      addXP(ex.xp); save(); updateProgress();
      showModal('Exercice réussi !',`+${ex.xp} xp`,`Bien joué !`);
      document.getElementById('ec_'+exId).querySelector('.extitle').innerHTML =
        `<span style="color:var(--lime)">✓</span><span>Ex — ${ex.title}</span>`;
      const b = document.getElementById('btn_'+les.id);
      if(b && les.exercises.every(e=>state.completed.has(e.id))){
        b.classList.add('ok');
        b.innerHTML = b.innerHTML.replace('○','<span class="chk">✓</span>');
      }
    }
  } else {
    ob.className='outbody err';
    ob.textContent='✗ Pas encore — vérifie la logique ou clique sur Indice.';
  }
}

function toggleHint(id){ document.getElementById('hint_'+id).classList.toggle('on') }
function toggleSol(id) { document.getElementById('sol_'+id).classList.toggle('on')  }

function copyCode(btn){
  const txt = btn.closest('.cblock').querySelector('.c-body').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='copié !';
    setTimeout(()=>btn.textContent='copier',1500);
  });
}

/* ─── MODAL ───────────────────────────────── */
function showModal(title,xp,text){
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mXp').textContent    = xp;
  document.getElementById('mText').textContent  = text;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){ document.getElementById('modal').classList.remove('on') }

/* ─── SYNTAX HIGHLIGHT ────────────────────── */
function hl(code){
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/#.*$/gm, m=>`<span class="cm">${m}</span>`)
    .replace(/\b(def|return|import|from|if|elif|else|for|while|in|not|and|or|try|except|finally|with|as|break|continue|class|True|False|None|pass|raise|lambda)\b/g, m=>`<span class="kw">${m}</span>`)
    .replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|"[^"]*"|'[^']*')/g, m=>`<span class="str">${m}</span>`)
    .replace(/\b(\d+)\b/g, m=>`<span class="num">${m}</span>`);
}
